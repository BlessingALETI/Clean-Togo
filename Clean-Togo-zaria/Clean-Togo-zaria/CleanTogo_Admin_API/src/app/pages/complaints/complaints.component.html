<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h2 class="mb-0">Réclamations</h2>
  </div>
</div>

<div *ngIf="loading" class="alert alert-info">Chargement...</div>

<div class="ct-card" *ngIf="!loading">
  <table class="table table-sm align-middle mb-0">
    <thead>
      <tr>
        <th>Client</th>
        <th>Titre</th>
        <th>Message</th>
        <th>Statut</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of list">
        <td class="fw-semibold">{{ clientName(c.clientId) }}</td>
        <td>{{ c.title }}</td>
        <td class="text-muted small">{{ c.message }}</td>
        <td>
          <span class="badge"
            [ngClass]="{
              'bg-danger-subtle text-danger': c.status==='Ouverte',
              'bg-warning-subtle text-warning': c.status==='En cours',
              'bg-success-subtle text-success': c.status==='Résolue'
            }">{{ c.status }}</span>
        </td>
        <td>
          <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-secondary" (click)="setStatus(c,'En cours')">En cours</button>
            <button class="btn btn-outline-success" (click)="setStatus(c,'Résolue')">Résolue</button>
          </div>
        </td>
      </tr>
      <tr *ngIf="list.length===0">
        <td colspan="5"><app-table-empty message="Aucune réclamation."></app-table-empty></td>
      </tr>
    </tbody>
  </table>
</div>
