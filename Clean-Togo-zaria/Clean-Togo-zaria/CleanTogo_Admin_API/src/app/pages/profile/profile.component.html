<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h2 class="mb-0">Profil</h2>
    <div class="text-muted">Compte administrateur</div>
  </div>
</div>

<div class="ct-card" *ngIf="auth.currentUser() as u">
  <div class="row g-3">
    <div class="col-12 col-md-6">
      <div class="text-muted small">Nom</div>
      <div class="fw-semibold">{{ u.fullName }}</div>
    </div>
    <div class="col-12 col-md-6">
      <div class="text-muted small">Email</div>
      <div class="fw-semibold">{{ u.email }}</div>
    </div>
  </div>

  <hr>

  <div class="text-muted small mb-2">À faire plus tard</div>
  <ul class="mb-0">
    <li>Modification du profil</li>
    <li>Gestion des rôles</li>
    <li>Changement de mot de passe</li>
  </ul>
</div>
