<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h2 class="mb-0">Gestion des chauffeurs</h2>
  </div>
</div>

<div *ngIf="loading" class="alert alert-info">Chargement...</div>

<div class="ct-card" *ngIf="!loading">
  <table class="table table-sm align-middle mb-0">
    <thead>
      <tr>
        <th>Nom</th>
        <th>Contact</th>
        <th>Zone</th>
        <th>Statut</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let d of drivers">
        <td class="fw-semibold">{{ d.fullName }}</td>
        <td>{{ d.phone }}</td>
        <td>{{ d.quartier }}</td>
        <td>
          <span class="badge"
            [ngClass]="{
              'bg-success-subtle text-success': d.status==='Actif',
              'bg-warning-subtle text-warning': d.status==='En attente',
              'bg-danger-subtle text-danger': d.status==='Suspendu'
            }">{{ d.status }}</span>
        </td>
      </tr>
      <tr *ngIf="drivers.length===0">
        <td colspan="4"><app-table-empty message="Aucun chauffeur."></app-table-empty></td>
      </tr>
    </tbody>
  </table>
</div>
