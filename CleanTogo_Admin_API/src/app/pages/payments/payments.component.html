<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h2 class="mb-0">Finances</h2>
  </div>
  <div class="ct-card py-2 px-3">
    <div class="small text-muted">Total encaissé</div>
    <div class="fw-bold">{{ totalPaid() | number }} FCFA</div>
  </div>
</div>

<div *ngIf="loading" class="alert alert-info">Chargement...</div>

<div class="ct-card" *ngIf="!loading">
  <table class="table table-sm align-middle mb-0">
    <thead>
      <tr>
        <th>Client</th>
        <th>Montant</th>
        <th>Méthode</th>
        <th>Statut</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of payments">
        <td class="fw-semibold">{{ clientName(p.clientId) }}</td>
        <td>{{ p.amountFCFA | number }} FCFA</td>
        <td>{{ p.method }}</td>
        <td>
          <span class="badge" [ngClass]="p.status==='Payé' ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'">
            {{ p.status }}
          </span>
        </td>
        <td class="text-muted small">{{ p.createdAtISO }}</td>
      </tr>
      <tr *ngIf="payments.length===0">
        <td colspan="5"><app-table-empty message="Aucun paiement."></app-table-empty></td>
      </tr>
    </tbody>
  </table>
</div>
