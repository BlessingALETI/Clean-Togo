<div class="d-flex justify-content-between align-items-start mb-3">
  <div>
    <h2 class="mb-0">Profil</h2>
    <div class="text-muted">Compte administrateur</div>
  </div>
</div>

<div class="ct-card">
  <div class="row">
    <div class="col-md-6">
      <div class="text-muted small">Nom</div>
      <div class="fw-semibold">{{ admin.fullName }}</div>
    </div>

    <div class="col-md-6">
      <div class="text-muted small">Email</div>
      <!-- éviter le bug Angular '@' -->
      <div class="fw-semibold">{{ admin.email }}</div>
    </div>
  </div>

  <hr>

  <div class="d-flex flex-wrap gap-2">
    <button class="btn btn-outline-primary" (click)="openEdit()">Modifier le profil</button>
    <button class="btn btn-outline-secondary" (click)="openRoles()">Gestion des rôles</button>
    <button class="btn btn-outline-success" (click)="openPassword()">Changer le mot de passe</button>
  </div>

  <div class="mt-3 text-muted small">
    Rôle actuel : <b>{{ roleLabel(admin.role) }}</b>
  </div>
</div>

<!-- Toast -->
<div class="ct-toast" *ngIf="toast" [ngClass]="toast.type === 'success' ? 't-success' : 't-danger'">
  {{ toast.msg }}
</div>

<!-- Modal Edit -->
<div class="ct-modal-backdrop" *ngIf="editOpen">
  <div class="ct-modal">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="fw-semibold">Modifier le profil</div>
      <button class="btn btn-sm btn-outline-secondary" (click)="closeAll()">X</button>
    </div>

    <div class="row g-2">
      <div class="col-12">
        <label class="form-label">Nom</label>
        <input class="form-control" [(ngModel)]="editForm.fullName" />
      </div>
      <div class="col-12">
        <label class="form-label">Email</label>
        <input class="form-control" [(ngModel)]="editForm.email" />
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-3">
      <button class="btn btn-outline-secondary" (click)="closeAll()">Annuler</button>
      <button class="btn btn-primary" (click)="saveEdit()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal Roles -->
<div class="ct-modal-backdrop" *ngIf="rolesOpen">
  <div class="ct-modal">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="fw-semibold">Gestion des rôles</div>
      <button class="btn btn-sm btn-outline-secondary" (click)="closeAll()">X</button>
    </div>

    <label class="form-label">Rôle</label>
    <select class="form-select" [(ngModel)]="roleForm.role">
      <option value="ADMIN">Administrateur</option>
      <option value="COMPTABLE">Comptable</option>
      <option value="SERVEUR">Serveur</option>
      <option value="CUISINIER">Cuisinier</option>
    </select>

    <div class="d-flex justify-content-end gap-2 mt-3">
      <button class="btn btn-outline-secondary" (click)="closeAll()">Annuler</button>
      <button class="btn btn-secondary" (click)="saveRole()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal Password -->
<div class="ct-modal-backdrop" *ngIf="passOpen">
  <div class="ct-modal">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="fw-semibold">Changer le mot de passe</div>
      <button class="btn btn-sm btn-outline-secondary" (click)="closeAll()">X</button>
    </div>

    <div class="row g-2">
      <div class="col-12">
        <label class="form-label">Ancien mot de passe</label>
        <input class="form-control" type="password" [(ngModel)]="passForm.oldPass" />
      </div>

      <div class="col-12">
        <label class="form-label">Nouveau mot de passe</label>
        <input class="form-control" type="password" [(ngModel)]="passForm.newPass" />
      </div>

      <div class="col-12">
        <label class="form-label">Confirmer</label>
        <input class="form-control" type="password" [(ngModel)]="passForm.confirm" />
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-3">
      <button class="btn btn-outline-secondary" (click)="closeAll()">Annuler</button>
      <button class="btn btn-success" (click)="savePassword()">Enregistrer</button>
    </div>
  </div>
</div>
